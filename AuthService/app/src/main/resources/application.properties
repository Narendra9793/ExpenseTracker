spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/authservice

spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:password}

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

server.port=9090

logging.level.org.springframework.security=DEBUG~
logging.level.org.authservice1=DEBUG

spring.kafka.producer.bootstrap-servers=${KAFKA_HOST:localhost}:${KAFKA_PORT:9092}

spring.kafka.producer.key-serializer=org.authservice.serializer.UserInfoSerializer
spring.kafka.producer.value-serializer=org.authservice.serializer.UserInfoSerializer

spring.kafka.topic.name=user_service
spring.kafka.producer.properties.spring.json.type.mapping=auth:authservice.model.UserInfoEvent