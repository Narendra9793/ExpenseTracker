version: '3.8'

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.4
    container_name: zookeeper
    restart: always
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.4
    container_name: kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  mysql:
    image: mysql:8.3.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_USER: test
      MYSQL_PASSWORD: 'password'
      MYSQL_ROOT_PASSWORD: password
    expose:
      - '3306'
    volumes:
      - mysql-data:/var/lib/mysql

  authservice:
    image: authservice:latest
    container_name: authservice
    restart: always
    depends_on:
      - mysql
      - kafka
    expose:
      - "9090"
    environment:
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/authservice
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
      # SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  userservice:
    image: userservice:latest
    container_name: userservice
    restart: always
    depends_on:
      - mysql
      - kafka
    expose:
      - "8080"
    environment:
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/userservice
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
      # SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  
  expenseservice:
    image: expenseservice:latest
    container_name: expenseservice
    restart: always
    depends_on:
      - mysql
      - kafka
    expose:
      - "6060"
    environment:
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/expenseservice
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
      # SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  
  dsservice:
    image: dsservice:latest
    container_name: dsservice
    restart: always
    depends_on:
      - mysql
      - kafka
      - expenseservice
      - userservice
    expose:
      - "7070"
    environment:
     KAFKA_HOST: kafka
     KAFKA_PORT: 9092
     OPENAI_API_KEY: L92HyjYIS2qeiFJDLQi3Iy76WHdDceaU

  kongservice:
    image: kong:3.8
    container_name: kongservice
    restart: always

    depends_on:
      - authservice
      - userservice
      - expenseservice
      - dsservice

    volumes:
      - ./config:/usr/local/kong/declarative
      - ./custom-plugins/custom-auth:/usr/local/share/lua/5.1/kong/plugins/custom-auth

    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: "/usr/local/kong/declarative/kong.yml"

      KONG_PROXY_ACCESS_LOG: "/dev/stdout"
      KONG_ADMIN_ACCESS_LOG: "/dev/stdout"

      KONG_PROXY_ERROR_LOG: "/dev/stderr"
      KONG_ADMIN_ERROR_LOG: "/dev/stderr"

      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PROXY_LISTEN: "0.0.0.0:8000"

      KONG_LOG_LEVEL: "info"

      KONG_PLUGINS: "bundled,custom-auth"

    ports:
      - "8000:8000"
      - "8001:8001"
volumes:
    mysql-data:

